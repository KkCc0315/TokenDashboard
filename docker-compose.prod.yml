version: "3.9"

services:
  mysql:
    image: mysql:8.0.39
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: token_dashboard
      MYSQL_USER: dashboard
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 4000
      DATABASE_URL: mysql://dashboard:${MYSQL_PASSWORD}@mysql:3306/token_dashboard
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: https://${DOMAIN}
      MARKET_CACHE_TTL: 45
      MARKET_REFRESH_INTERVAL_SECONDS: 60
      ALERT_EVALUATION_INTERVAL_SECONDS: 60
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${DOMAIN}/api
    environment:
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mysql_data:
